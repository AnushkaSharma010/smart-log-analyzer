server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
          routes:
            - id: log-service-route
              uri: lb://log-service
              predicates:
                - Path=/api/logs/**

            - id: analysis-service-route
              uri: lb://analysis-service
              predicates:
                - Path=/api/analysis/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    "[org.springframework.cloud.gateway]": DEBUG