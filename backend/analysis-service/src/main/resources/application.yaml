server:
  port: 8082

spring:
  application:
    name: analysis-service
  data:
    mongodb:
      uri: mongodb://localhost:27017/analysisdb
  ai:
    mistralai:
      api-key: ${MISTRAL_API_KEY}
      chat:
        options:
          model: mistral-small-latest
          temperature: 0.3

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    '[com.anushka.analysis_service.client.LogServiceClient]': DEBUG 

management:
  endpoints:
    web:
      exposure:
        include: health,info,env
