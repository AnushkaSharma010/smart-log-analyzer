server:
  port: 8081

spring:
  application:
    name: log-service
  datasource:
    url: jdbc:mysql://localhost:3306/logdb?createDatabaseIfNotExist=true
    username: root
    password: admin123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

log:
  storage:
    base-path: C:/Users/anush/Documents/SmartLogAnalyzer/uploadlogs